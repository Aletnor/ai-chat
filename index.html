<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<!-- marked.js: Markdown 渲染 -->
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<!-- highlight.js: 代码高亮 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
/* ========== CSS 变量 / 主题 ========== */
:root {
  --bg-primary: #1a1a19;
  --bg-secondary: #141413;
  --bg-tertiary: #2c2c2b;
  --bg-input: #2c2c2b;
  --text-primary: #e8e6dc;
  --text-secondary: #b0aea5;
  --text-muted: #7a7874;
  --accent: #d97757;
  --accent-hover: #e58b6d;
  --user-msg-bg: #2c2c2b;
  --ai-msg-bg: transparent;
  --border-color: #333332;
  --danger: #e87062;
  --danger-hover: #d45a4c;
  --success: #5bb98b;
  --sidebar-width: 280px;
  --scrollbar-thumb: #4a4a48;
  --scrollbar-track: transparent;
  --code-bg: #1e1e1e;
  --code-header-bg: #2d2d2c;
  --code-text: #ccc;
}

[data-theme="light"] {
  --bg-primary: #f8f8f6;
  --bg-secondary: #f8f8f6;
  --bg-tertiary: #e8e6e1;
  --bg-input: #ffffff;
  --text-primary: #121212;
  --text-secondary: #5a5a5a;
  --text-muted: #999999;
  --accent: #d97757;
  --accent-hover: #c56843;
  --user-msg-bg: #efeeeb;
  --ai-msg-bg: transparent;
  --border-color: #e8e6dc;
  --danger: #d94b4b;
  --danger-hover: #c03a3a;
  --success: #3aa06b;
  --scrollbar-thumb: #d0cec9;
  --scrollbar-track: transparent;
  --code-bg: #f5f4f1;
  --code-header-bg: #eae8e4;
  --code-text: #37352f;
}

/* ========== 全局样式 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

button {
  cursor: pointer;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.2s;
}

/* ========== 布局 ========== */
.app-container {
  display: flex;
  height: 100vh;
}

/* ========== 侧边栏 ========== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid rgba(31, 31, 30, 0.1);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.3s;
}
[data-theme="light"] .sidebar { border-right-color: rgba(31, 31, 30, 0.15); }

.sidebar-header {
  padding: 8px;
}

.sidebar-header button {
  width: 100%;
  padding: 8px 12px;
  background: none;
  color: var(--text-primary);
  font-weight: 500;
  border-radius: 8px;
  font-size: 14px;
  text-align: left;
}
.sidebar-header button:hover { background: var(--bg-tertiary); }

/* Sidebar footer — 用户信息 / 设置入口 */
.sidebar-footer {
  padding: 8px 12px 12px;
  border-top: 1px solid var(--border-color);
}

.sidebar-user {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: none;
  color: var(--text-primary);
  border-radius: 8px;
  font-size: 14px;
  text-align: left;
}
.sidebar-user:hover { background: var(--bg-tertiary); }

.user-avatar-small {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  font-weight: 600;
}

.user-display-name {
  flex: 1;
  font-weight: 500;
  font-size: 13px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.footer-gear {
  color: var(--text-muted);
  font-size: 16px;
  flex-shrink: 0;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
}

.chat-list::before {
  content: '对话';
  display: block;
  padding: 10px 12px 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}

.chat-item {
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 1px;
  transition: background 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.chat-item:hover { background: var(--bg-tertiary); }
.chat-item.active { background: rgba(217, 119, 87, 0.12); }
.chat-item.active:hover { background: rgba(217, 119, 87, 0.2); }

.chat-item-info { overflow: hidden; flex: 1; }

.chat-item-title {
  font-size: 14px;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-item-time {
  display: none;
}

.chat-item-menu-btn {
  background: none;
  color: var(--text-muted);
  font-size: 18px;
  padding: 2px 4px;
  border-radius: 6px;
  opacity: 0;
  flex-shrink: 0;
  line-height: 1;
}
.chat-item:hover .chat-item-menu-btn,
.chat-item-menu-btn.active { opacity: 1; }
.chat-item-menu-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }

.chat-context-menu {
  display: none;
  position: fixed;
  width: 160px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  z-index: 100;
}
.chat-context-menu.active { display: block; }

.ctx-menu-item {
  width: 100%;
  padding: 8px 12px;
  background: none;
  color: var(--text-primary);
  font-size: 14px;
  text-align: left;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctx-menu-item:hover { background: var(--bg-tertiary); }
.ctx-menu-item.ctx-danger { color: var(--danger); }
.ctx-menu-item.ctx-danger:hover { background: rgba(232,112,98,0.1); }

.ctx-menu-item svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ========== 主区域 ========== */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* 顶栏 */
.topbar {
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-primary);
}

.topbar .btn-toggle-sidebar {
  display: none;
  background: none;
  color: var(--text-primary);
  font-size: 22px;
  padding: 4px 8px;
}

.topbar-title {
  font-size: 16px;
  font-weight: 500;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-primary);
}

/* 消息区域 */
.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  scroll-behavior: smooth;
}

.message {
  max-width: 750px;
  margin: 0 auto;
  padding: 14px 0;
}

.message-user {
  display: flex;
  justify-content: flex-end;
}

.message-user .message-body {
  max-width: 85%;
}

.message-assistant .message-body {
  width: 100%;
}

.message-body {
  min-width: 0;
}

.message-role { display: none; }

.message-content {
  line-height: 1.75;
  font-size: 16px;
  word-break: break-word;
}

.message-user .message-content {
  background: var(--user-msg-bg);
  padding: 10px 16px;
  border-radius: 12px;
}

.message-assistant .message-content {
  padding: 4px 0;
}

/* Markdown 渲染样式 */
.message-content p { margin-bottom: 10px; }
.message-content p:last-child { margin-bottom: 0; }
.message-content ul, .message-content ol { margin: 10px 0; padding-left: 24px; }
.message-content li { margin-bottom: 6px; line-height: 1.7; }
.message-content strong { font-weight: 600; }
.message-content em { font-style: italic; }
.message-content h1 { font-size: 1.5em; font-weight: 600; margin: 20px 0 10px; }
.message-content h2 { font-size: 1.3em; font-weight: 600; margin: 18px 0 8px; }
.message-content h3 { font-size: 1.1em; font-weight: 600; margin: 14px 0 6px; }
.message-content blockquote {
  border-left: 3px solid var(--border-color);
  padding-left: 14px;
  color: var(--text-secondary);
  margin: 12px 0;
}
.message-content a { color: var(--accent); text-decoration: none; }
.message-content a:hover { text-decoration: underline; }
.message-content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
.message-content th, .message-content td { border: 1px solid var(--border-color); padding: 8px 12px; text-align: left; }
.message-content th { background: var(--bg-tertiary); font-weight: 600; }
.message-content hr { border: none; border-top: 1px solid var(--border-color); margin: 16px 0; }

/* 行内代码 */
.message-content code:not(pre code) {
  background: var(--bg-tertiary);
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 0.875em;
  font-family: "Cascadia Code", "Fira Code", "SF Mono", Consolas, monospace;
}

/* 代码块容器 */
.code-block-wrapper {
  position: relative;
  margin: 10px 0;
  border-radius: 8px;
  overflow: hidden;
  background: var(--code-bg);
  border: 1px solid var(--border-color);
}

.code-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: var(--code-header-bg);
  font-size: 12px;
  color: var(--text-muted);
}

.code-block-copy {
  background: none;
  color: var(--text-muted);
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 4px;
}
.code-block-copy:hover { color: var(--text-primary); background: var(--bg-tertiary); }

.code-block-wrapper pre {
  margin: 0;
  padding: 14px;
  overflow-x: auto;
}

.code-block-wrapper pre code {
  font-family: ui-monospace, "Cascadia Code", "Fira Code", Consolas, monospace;
  font-size: 14px;
  line-height: 1.5;
}

/* 欢迎页 */
.welcome {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  color: var(--text-muted);
}

.welcome h2 { font-size: 28px; margin-bottom: 8px; color: var(--text-primary); font-weight: 600; }
.welcome p { font-size: 15px; color: var(--text-secondary); }

/* 输入区域 */
.input-area {
  padding: 12px 16px 16px;
  background: var(--bg-primary);
  position: relative;
}

.input-wrapper {
  max-width: 750px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--bg-input);
  border: none;
  border-radius: 20px;
  padding: 6px 6px 6px 16px;
  transition: box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.035), 0 0 0 0.5px rgba(31,31,30,0.15);
}

.input-wrapper:focus-within { box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(31,31,30,0.25); }

.input-wrapper textarea {
  flex: 1;
  resize: none;
  border: none;
  padding: 8px 0;
  font-size: 15px;
  font-family: inherit;
  line-height: 1.5;
  background: transparent;
  color: var(--text-primary);
  max-height: 200px;
  min-height: 36px;
  outline: none;
}

.input-wrapper textarea::placeholder { color: var(--text-muted); }

.btn-send {
  width: 36px;
  height: 36px;
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border-radius: 10px;
}
.btn-send:hover { background: var(--accent-hover); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-send.btn-stop { background: var(--danger); color: #fff; }
.btn-send.btn-stop:hover { background: var(--danger-hover); }

/* ========== 设置面板 ========== */
.settings-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.settings-overlay.active { display: flex; }

.settings-panel {
  background: var(--bg-primary);
  border-radius: 16px;
  padding: 28px;
  width: 90%;
  max-width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid var(--border-color);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}

.settings-panel h2 {
  font-size: 18px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.settings-panel h2 button {
  background: none;
  color: var(--text-muted);
  font-size: 22px;
  padding: 2px 6px;
}

.settings-group {
  margin-bottom: 16px;
}

.settings-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.settings-group input:not([type="checkbox"]),
.settings-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.settings-group input:not([type="checkbox"]):focus,
.settings-group select:focus {
  border-color: var(--accent);
}

.password-wrapper {
  position: relative;
}

.password-wrapper input { padding-right: 40px; }

.password-toggle {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  color: var(--text-muted);
  font-size: 13px;
  padding: 2px 6px;
}

.settings-group .hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.checkbox-label {
  display: flex !important;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-weight: 600;
}
.checkbox-label input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}

.theme-switcher {
  display: flex;
  gap: 8px;
}

.theme-switcher button {
  flex: 1;
  padding: 8px;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  font-size: 13px;
  border-radius: 8px;
}
.theme-switcher button:hover { color: var(--text-primary); }
.theme-switcher button.active { background: var(--text-primary); color: var(--bg-primary); }

/* 错误/成功提示 */
.error-toast {
  display: none;
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--danger);
  color: #fff;
  padding: 10px 24px;
  border-radius: 12px;
  font-size: 13.5px;
  z-index: 200;
  max-width: 80%;
  text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  animation: toastIn 0.2s ease-out;
}
.error-toast.active { display: block; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* 消息操作栏 */
.message-actions {
  display: flex;
  gap: 2px;
  margin-top: 4px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.15s, visibility 0.15s;
}

.message-user .message-actions {
  justify-content: flex-end;
}

.message:hover .message-actions {
  opacity: 1;
  visibility: visible;
}

.message-actions button {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  color: var(--text-muted);
  border-radius: 6px;
}
.message-actions button:hover { color: var(--text-primary); background: var(--bg-tertiary); }
.message-actions .btn-delete-msg:hover { color: var(--danger); }

.message-actions button svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* 消息编辑模式 — Claude 风格 */
.message-edit-wrapper {
  border: 2px solid #6b9bd2;
  border-radius: 16px;
  padding: 14px 16px;
  background: var(--bg-input);
}

.message-edit-wrapper textarea {
  width: 100%;
  min-height: 40px;
  padding: 0;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  line-height: 1.6;
  resize: none;
  outline: none;
}

.message-edit-info {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
}

.message-edit-info svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
  margin-top: 1px;
}

.message-edit-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
}

.message-edit-footer button {
  padding: 8px 20px;
  font-size: 14px;
  border-radius: 20px;
}
.message-edit-footer .btn-cancel {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}
.message-edit-footer .btn-cancel:hover { background: var(--border-color); }

.message-edit-footer .btn-save {
  background: var(--text-primary);
  color: var(--bg-primary);
  font-weight: 500;
}
.message-edit-footer .btn-save:hover { opacity: 0.85; }

/* 消息版本分支导航 */
.message-branch-nav {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  margin-left: 4px;
}

.message-branch-nav button {
  width: 24px;
  height: 24px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  color: var(--text-muted);
  border-radius: 6px;
  font-size: 16px;
}
.message-branch-nav button:hover { color: var(--text-primary); background: var(--bg-tertiary); }
.message-branch-nav button:disabled { opacity: 0.3; cursor: default; }
.message-branch-nav button:disabled:hover { background: none; color: var(--text-muted); }

.branch-counter {
  font-size: 12px;
  color: var(--text-muted);
  min-width: 28px;
  text-align: center;
}

/* 工具菜单按钮 + 弹出面板 */
.btn-tools {
  width: 36px;
  height: 36px;
  background: none;
  color: var(--text-muted);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border-radius: 10px;
}
.btn-tools:hover { color: var(--text-primary); background: var(--bg-tertiary); }

.tools-menu {
  display: none;
  position: absolute;
  bottom: calc(100% + 4px);
  left: 16px;
  width: 180px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  z-index: 40;
}
.tools-menu.active { display: block; }

.tools-menu-item {
  width: 100%;
  padding: 9px 12px;
  background: none;
  color: var(--text-primary);
  font-size: 14px;
  text-align: left;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.tools-menu-item:hover { background: var(--bg-tertiary); }

.tools-menu-item svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/* 删除模式 */
.delete-mode-banner {
  padding: 10px 16px;
  background: rgba(232,112,98,0.1);
  color: var(--danger);
  font-size: 13px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-shrink: 0;
}
.delete-mode-banner button {
  padding: 4px 14px;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 12px;
  border-radius: 6px;
}

.delete-mode .message {
  cursor: pointer !important;
  border-radius: 8px;
  transition: background 0.15s;
}
.delete-mode .message .message-body * { pointer-events: none; }
.delete-mode .message.delete-highlight { background: rgba(232,112,98,0.1); }

.delete-confirm-bar {
  padding: 12px 16px;
  background: var(--bg-primary);
  border-top: 1px solid var(--border-color);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  flex-shrink: 0;
}
.delete-confirm-bar .btn-confirm-delete {
  padding: 8px 20px;
  background: var(--danger);
  color: #fff;
  border-radius: 8px;
}
.delete-confirm-bar .btn-confirm-delete:hover { background: var(--danger-hover); }
.delete-confirm-bar .btn-cancel-delete {
  padding: 8px 20px;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-radius: 8px;
}
.delete-confirm-bar .btn-cancel-delete:hover { background: var(--border-color); }

/* 思考链折叠块 */
.thinking-block {
  margin-bottom: 8px;
}

.thinking-toggle {
  width: auto;
  display: inline-flex;
  padding: 4px 0;
  background: none;
  color: var(--text-muted);
  font-size: 13.5px;
  border-radius: 0;
  align-items: center;
  gap: 4px;
  text-align: left;
}
.thinking-toggle:hover { color: var(--text-secondary); }

.thinking-toggle .arrow {
  transition: transform 0.2s;
  display: inline-block;
  font-size: 10px;
}
.thinking-toggle.open .arrow { transform: rotate(90deg); }

.thinking-content {
  display: none;
  padding: 8px 0 8px 14px;

  color: var(--text-primary);
  background: none;
  border-left: 2px solid var(--border-color);
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}
.thinking-content.open { display: block; }

/* AI 正在输入的光标动画 */
.typing-cursor::after {
  content: "▍";
  animation: blink 1s infinite;
  color: var(--accent);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Claude 加载菊花 spinner */
.claude-spinner {
  padding: 8px 0;
  display: flex;
  align-items: center;
}

.claude-spinner-icon {

  animation: claude-spin 0.8s linear infinite;
}

@keyframes claude-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0;

}
</style>
</head>
<body>

<div class="app-container">

        <button class="tools-menu-item" id="toolRegen"><svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>重新生成</button>

<!-- 设置面板 -->

<!-- 错误提示 -->

<!-- 聊天右键菜单 -->
<div class="chat-context-menu" id="chatContextMenu">
  <button class="ctx-menu-item" id="ctxRename"><svg viewBox="0 0 24 24"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg>重命名</button>
  <button class="ctx-menu-item ctx-danger" id="ctxDelete"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>删除</button>

<script>
/* ================================================================
 *  CONFIG — 所有可配置项集中管理
 * ================================================================ */
const CONFIG = {
  apiUrl: '',
  apiKey: '',
  model: 'gpt-4o',
  apiFormat: 'openai',
  enableThinking: false,
  theme: 'dark',
  sendKey: 'ctrl+enter',
};

/* ================================================================
 *  Claude 加载菊花 SVG
 * ================================================================ */
const SPINNER_SVG = '<svg class="claude-spinner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>';

/* ================================================================
 *  Storage — localStorage 读写封装
 * ================================================================ */
const Storage = (() => {
  let canUseLS = false;
  const memoryStore = {};
  try { localStorage.setItem('__test__', '1'); localStorage.removeItem('__test__'); canUseLS = true; } catch {}
  return {
    get(key, fallback) {
      try {
        const raw = canUseLS ? localStorage.getItem(key) : memoryStore[key];
        return raw ? JSON.parse(raw) : fallback;
      } catch { return fallback; }
    },
    set(key, value) {
      const json = JSON.stringify(value);
      if (canUseLS) {
        try { localStorage.setItem(key, json); } catch {
          showError('存储空间不足，请清理旧对话');
        }
      } else {
        memoryStore[key] = json;
      }
    },
    remove(key) {
      try { if (canUseLS) localStorage.removeItem(key); else delete memoryStore[key]; } catch {}
    }
  };
})();

/* ================================================================
 *  State — 应用状态
 * ================================================================ */
let conversations = Storage.get('conversations', []);
let activeConvId = Storage.get('activeConvId', null);
let isGenerating = false;
let abortController = null;

/* ================================================================
 *  DOM 引用
 * ================================================================ */
const $ = (sel) => document.querySelector(sel);
const chatListEl = $('#chatList');
const messagesEl = $('#messagesContainer');
const welcomeEl = $('#welcome');
const userInputEl = $('#userInput');
const btnSend = $('#btnSend');
const topbarTitle = $('#topbarTitle');
const errorToastEl = $('#errorToast');

/* ================================================================
 *  工具函数
 * ================================================================ */
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function formatTime(ts) {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

let errorTimer = null;
function showError(msg) {
  errorToastEl.textContent = msg;
  errorToastEl.classList.add('active');
  clearTimeout(errorTimer);
  errorTimer = setTimeout(() => errorToastEl.classList.remove('active'), 5000);
}

function getActiveConversation() {
  return conversations.find(c => c.id === activeConvId) || null;
}

function saveConversations() {
  Storage.set('conversations', conversations);
  Storage.set('activeConvId', activeConvId);
}

/* ================================================================
 *  Markdown 渲染（marked + highlight.js）
 * ================================================================ */
marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true,
});

function renderMarkdown(text) {
  let html = marked.parse(text);
  // 给代码块加上包装器和复制按钮
  html = html.replace(/<pre><code class="language-(\w+)">([\s\S]*?)<\/code><\/pre>/g,
    (match, lang, code) => {
      const id = 'code-' + generateId();
      return `<div class="code-block-wrapper">
        <div class="code-block-header"><span>${lang}</span><button class="code-block-copy" onclick="copyCode('${id}')">复制</button></div>
        <pre><code id="${id}" class="language-${lang}">${code}</code></pre></div>`;
    });
  // 没有指定语言的代码块
  html = html.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g,
    (match, code) => {
      const id = 'code-' + generateId();
      return `<div class="code-block-wrapper">
        <div class="code-block-header"><span>code</span><button class="code-block-copy" onclick="copyCode('${id}')">复制</button></div>
        <pre><code id="${id}">${code}</code></pre></div>`;
    });
  return html;
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const text = el.textContent;
  const btn = el.closest('.code-block-wrapper').querySelector('.code-block-copy');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '已复制';
      setTimeout(() => btn.textContent = '复制', 1500);
    }).catch(() => copyFallback(text, btn));
  } else {
    copyFallback(text, btn);
  }
}

function copyFallback(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  btn.textContent = '已复制';
  setTimeout(() => btn.textContent = '复制', 1500);
}

/* ================================================================
 *  侧边栏 — 对话列表渲染
 * ================================================================ */
function renderChatList() {
  chatListEl.innerHTML = '';
  const sorted = [...conversations].sort((a, b) => b.createdAt - a.createdAt);
  sorted.forEach(conv => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (conv.id === activeConvId ? ' active' : '');
    item.innerHTML = `
      <div class="chat-item-info">
        <div class="chat-item-title">${escapeHtml(conv.title)}</div>
      </div>
      <button class="chat-item-menu-btn" title="更多">⋮</button>`;
    item.querySelector('.chat-item-info').addEventListener('click', () => switchConversation(conv.id));
    item.querySelector('.chat-item-menu-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      showChatContextMenu(conv.id, e.currentTarget);
    });
    chatListEl.appendChild(item);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ================================================================
 *  对话管理
 * ================================================================ */
/* ================================================================
 *  聊天右键菜单
 * ================================================================ */
let contextMenuConvId = null;

function showChatContextMenu(convId, btnEl) {
  const menu = $('#chatContextMenu');
  contextMenuConvId = convId;
  const rect = btnEl.getBoundingClientRect();
  menu.style.top = rect.bottom + 4 + 'px';
  menu.style.left = Math.min(rect.left, window.innerWidth - 170) + 'px';
  menu.classList.add('active');
  document.querySelectorAll('.chat-item-menu-btn.active').forEach(el => el.classList.remove('active'));
  btnEl.classList.add('active');
}

function hideChatContextMenu() {
  $('#chatContextMenu').classList.remove('active');
  document.querySelectorAll('.chat-item-menu-btn.active').forEach(el => el.classList.remove('active'));
  contextMenuConvId = null;
}

function renameConversation() {
  if (!contextMenuConvId) return;
  const conv = conversations.find(c => c.id === contextMenuConvId);
  if (!conv) return;
  const newTitle = prompt('重命名对话：', conv.title);
  if (newTitle && newTitle.trim()) {
    conv.title = newTitle.trim();
    saveConversations();
    renderChatList();
    if (conv.id === activeConvId) topbarTitle.textContent = conv.title;
  }
  hideChatContextMenu();
}

function contextDeleteConversation() {
  if (!contextMenuConvId) return;
  deleteConversation(contextMenuConvId);
  hideChatContextMenu();
}

function createConversation() {
  const conv = {
    id: generateId(),
    title: '新对话',
    createdAt: Date.now(),
    messages: [],
  };
  conversations.push(conv);
  activeConvId = conv.id;
  saveConversations();
  renderChatList();
  renderMessages();
  userInputEl.focus();
  closeSidebar();
}

function switchConversation(id) {
  activeConvId = id;
  saveConversations();
  renderChatList();
  renderMessages();
  closeSidebar();
}

function deleteConversation(id) {
  if (!confirm('确定删除这个对话吗？')) return;
  if (id === activeConvId && isGenerating) stopGeneration();
  conversations = conversations.filter(c => c.id !== id);
  if (activeConvId === id) {
    activeConvId = conversations.length > 0 ? conversations[conversations.length - 1].id : null;
  }
  saveConversations();
  renderChatList();
  renderMessages();
}

/* ================================================================
 *  消息渲染
 * ================================================================ */
function renderMessages() {
  const conv = getActiveConversation();
  if (!conv) {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
    topbarTitle.textContent = 'AI Chat';
    return;
  }
  welcomeEl.style.display = 'none';
  topbarTitle.textContent = conv.title;
  messagesEl.innerHTML = '';

  conv.messages.forEach((msg, i) => {
    if (msg.role === 'system') return;
    const el = createMessageEl(msg, i);
    messagesEl.appendChild(el);
  });
  scrollToBottom();
}

function createMessageEl(msg, msgIndex) {
  const div = document.createElement('div');
  div.className = `message message-${msg.role}`;
  div.dataset.msgIndex = msgIndex;
  const isUser = msg.role === 'user';
  const thinkingHtml = (!isUser && msg.reasoning) ? buildThinkingHtml(msg.reasoning) : '';

  const svgCopy = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
  const svgEdit = '<svg viewBox="0 0 24 24"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg>';
  const svgRegen = '<svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>';
  const svgDelete = '<svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>';

  const actions = [];
  actions.push(`<button class="btn-copy-msg" title="复制">${svgCopy}</button>`);
  actions.push(`<button class="btn-edit-msg" title="编辑">${svgEdit}</button>`);
  if (!isUser) actions.push(`<button class="btn-regen" title="重新生成">${svgRegen}</button>`);
  actions.push(`<button class="btn-delete-msg" title="删除">${svgDelete}</button>`);

  const variantCount = msg.variants ? msg.variants.length : 1;
  const activeIdx = msg.variants ? (msg.activeVariant || 0) : 0;
  if (variantCount > 1) {
    actions.push(`<div class="message-branch-nav">
      <button class="btn-branch-prev" title="上一个版本"${activeIdx === 0 ? ' disabled' : ''}>&#8249;</button>
      <span class="branch-counter">${activeIdx + 1} / ${variantCount}</span>
      <button class="btn-branch-next" title="下一个版本"${activeIdx === variantCount - 1 ? ' disabled' : ''}>&#8250;</button>
    </div>`);
  }

  div.innerHTML = `
    <div class="message-body">
      <div class="message-thinking">${thinkingHtml}</div>
      <div class="message-content">${isUser ? escapeHtml(msg.content).replace(/\n/g, '<br>') : renderMarkdown(msg.content)}</div>
      <div class="message-actions">${actions.join('')}</div>
    </div>`;

  div.querySelector('.btn-copy-msg').addEventListener('click', () => copyMessage(msg));
  div.querySelector('.btn-edit-msg').addEventListener('click', () => startEditMessage(div, msg, msgIndex));
  const regenBtn = div.querySelector('.btn-regen');
  if (regenBtn) regenBtn.addEventListener('click', () => regenerateMessage(msgIndex));
  div.querySelector('.btn-delete-msg').addEventListener('click', () => deleteMessage(msgIndex));
  const branchPrev = div.querySelector('.btn-branch-prev');
  const branchNext = div.querySelector('.btn-branch-next');
  if (branchPrev) branchPrev.addEventListener('click', () => switchVariant(msgIndex, -1));
  if (branchNext) branchNext.addEventListener('click', () => switchVariant(msgIndex, 1));

  return div;
}

function buildThinkingHtml(text) {
  if (!text) return '';
  return `<div class="thinking-block">
    <button class="thinking-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
      <span class="arrow">&#9654;</span> 思考过程
    </button>
    <div class="thinking-content">${escapeHtml(text)}</div>
  </div>`;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* ================================================================
 *  消息版本（分支）管理
 * ================================================================ */
function ensureVariants(msg) {
  if (!msg.variants) {
    msg.variants = [{ content: msg.content, reasoning: msg.reasoning || '', timestamp: msg.timestamp }];
    msg.activeVariant = 0;
  }
}

function switchVariant(msgIndex, direction) {
  const conv = getActiveConversation();
  if (!conv) return;
  const msg = conv.messages[msgIndex];
  if (!msg.variants || msg.variants.length <= 1) return;

  msg.variants[msg.activeVariant].content = msg.content;
  msg.variants[msg.activeVariant].reasoning = msg.reasoning || '';

  const newIdx = msg.activeVariant + direction;
  if (newIdx < 0 || newIdx >= msg.variants.length) return;

  msg.activeVariant = newIdx;
  msg.content = msg.variants[newIdx].content;
  msg.reasoning = msg.variants[newIdx].reasoning || '';

  saveConversations();
  renderMessages();
}

/* ================================================================
 *  流式 API 请求
 * ================================================================ */
async function sendMessage() {
  const text = userInputEl.value.trim();
  if (!text || isGenerating) return;

  if (!CONFIG.apiUrl || !CONFIG.apiKey) {
    showError('请先在设置中填写 API 地址和 API Key');
    return;
  }

  let conv = getActiveConversation();
  if (!conv) {
    createConversation();
    conv = getActiveConversation();
  }

  // 添加用户消息
  const userMsg = { role: 'user', content: text, timestamp: Date.now() };
  conv.messages.push(userMsg);
  // 自动标题：取第一条用户消息前20字
  if (conv.title === '新对话') {
    conv.title = text.slice(0, 20) + (text.length > 20 ? '...' : '');
    renderChatList();
  }

  userInputEl.value = '';
  autoResizeInput();

  // 渲染用户消息
  const userEl = createMessageEl(userMsg, conv.messages.length - 1);
  messagesEl.appendChild(userEl);
  scrollToBottom();

  // 准备 AI 消息占位
  const aiMsg = { role: 'assistant', content: '', reasoning: '', timestamp: Date.now() };
  conv.messages.push(aiMsg);
  const aiEl = createMessageEl(aiMsg, conv.messages.length - 1);
  const aiContentEl = aiEl.querySelector('.message-content');
  aiContentEl.innerHTML = '<div class="claude-spinner">' + SPINNER_SVG + '</div>';
  messagesEl.appendChild(aiEl);
  scrollToBottom();

  // 开始请求
  isGenerating = true;
  btnSend.innerHTML = '■';
  btnSend.classList.add('btn-stop');
  abortController = new AbortController();

  const apiMessages = conv.messages
    .filter(m => !(m.role === 'assistant' && !m.content))
    .map(m => ({ role: m.role, content: m.content }));

  if (apiMessages.length === 0) {
    showError('消息为空，请重试');
    conv.messages.pop();
    aiEl.remove();
    isGenerating = false;
    btnSend.innerHTML = '↑';
    btnSend.classList.remove('btn-stop');
    return;
  }

  try {
    if (CONFIG.apiFormat === 'anthropic') {
      await streamAnthropic(apiMessages, aiMsg, aiEl, aiContentEl);
    } else {
      await streamOpenAI(apiMessages, aiMsg, aiEl, aiContentEl);
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      // 用户主动停止 — 没内容则清理空消息
      if (!aiMsg.content && !aiMsg.reasoning) {
        conv.messages.pop();
        aiEl.remove();
      }
    } else if (err.message === 'Failed to fetch') {
      showError('网络错误，请检查 API 地址是否正确');
      if (!aiMsg.content) { conv.messages.pop(); aiEl.remove(); }
    } else {
      showError(err.message);
      if (!aiMsg.content) { conv.messages.pop(); aiEl.remove(); }
    }
  } finally {
    aiContentEl.classList.remove('typing-cursor');
    const sp = aiContentEl.querySelector('.claude-spinner');
    if (sp) sp.remove();
    isGenerating = false;
    abortController = null;
    btnSend.innerHTML = '↑';
    btnSend.classList.remove('btn-stop');
    saveConversations();
    renderChatList();
  }
}

/* ================================================================
 *  OpenAI 兼容格式流式请求
 * ================================================================ */
async function streamOpenAI(apiMessages, aiMsg, aiEl, aiContentEl) {
  const base = CONFIG.apiUrl.replace(/\/+$/, '');
  const url = base + '/v1/chat/completions';
  const body = { model: CONFIG.model, messages: apiMessages, stream: true };
  if (CONFIG.enableThinking) {
    body.include_reasoning = true;
  }

  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${CONFIG.apiKey}` },
    body: JSON.stringify(body),
    signal: abortController.signal,
  });

  if (!response.ok) { throw new Error(await parseApiError(response)); }

  if (!response.body || !response.body.getReader) {
    const json = await response.json();
    aiMsg.content = json.choices?.[0]?.message?.content || '';
    aiContentEl.innerHTML = renderMarkdown(aiMsg.content);
    return;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || !trimmed.startsWith('data:')) continue;
      const data = trimmed.slice(5).trim();
      if (data === '[DONE]') return;

      try {
        const json = JSON.parse(data);
        const delta = json.choices?.[0]?.delta;
        if (!delta) continue;
        const reasoning = delta.reasoning_content || delta.reasoning;
        if (reasoning) {
          aiMsg.reasoning += reasoning;
          updateThinkingBlock(aiEl, aiMsg.reasoning);
          const sp = aiContentEl.querySelector('.claude-spinner');
          if (sp) sp.remove();
        }
        if (delta.content) {
          aiMsg.content += delta.content;
          aiContentEl.innerHTML = renderMarkdown(aiMsg.content);
          aiContentEl.classList.add('typing-cursor');
          scrollToBottom();
        }
      } catch {}
    }
  }
}

/* ================================================================
 *  Claude 原生格式流式请求
 * ================================================================ */
async function streamAnthropic(apiMessages, aiMsg, aiEl, aiContentEl) {
  const base = CONFIG.apiUrl.replace(/\/+$/, '');
  const url = base + '/v1/messages';

  // 分离 system 消息
  let systemText = '';
  const claudeMessages = [];
  for (const m of apiMessages) {
    if (m.role === 'system') { systemText += (systemText ? '\n' : '') + m.content; }
    else { claudeMessages.push({ role: m.role, content: m.content }); }
  }

  const body = {
    model: CONFIG.model,
    messages: claudeMessages,
    max_tokens: 8192,
    stream: true,
  };
  if (systemText) body.system = systemText;
  if (CONFIG.enableThinking) {
    body.thinking = { type: 'enabled', budget_tokens: 4096 };
  }

  const headers = {
    'Content-Type': 'application/json',
    'x-api-key': CONFIG.apiKey,
    'anthropic-version': '2023-06-01',
  };
  if (CONFIG.enableThinking) {
    headers['anthropic-beta'] = 'interleaved-thinking-2025-05-14';
  }

  const response = await fetch(url, {
    method: 'POST',
    headers: headers,
    body: JSON.stringify(body),
    signal: abortController.signal,
  });

  if (!response.ok) { throw new Error(await parseApiError(response)); }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed.startsWith('data:')) continue;
      const data = trimmed.slice(5).trim();
      if (!data) continue;

      try {
        const json = JSON.parse(data);

        if (json.type === 'content_block_delta') {
          const delta = json.delta;
          if (delta.type === 'thinking_delta' && delta.thinking) {
            aiMsg.reasoning += delta.thinking;
            updateThinkingBlock(aiEl, aiMsg.reasoning);
            const sp = aiContentEl.querySelector('.claude-spinner');
            if (sp) sp.remove();
          } else if (delta.type === 'text_delta' && delta.text) {
            aiMsg.content += delta.text;
            aiContentEl.innerHTML = renderMarkdown(aiMsg.content);
            aiContentEl.classList.add('typing-cursor');
            scrollToBottom();
          }
        } else if (json.type === 'message_stop') {
          return;
        } else if (json.type === 'error') {
          throw new Error(json.error?.message || 'Claude API 错误');
        }
      } catch (e) {
        if (e.message && !e.message.startsWith('Unexpected')) throw e;
      }
    }
  }
}

/* ================================================================
 *  公共工具：解析 API 错误、更新思考块
 * ================================================================ */
async function parseApiError(response) {
  const errBody = await response.text().catch(() => '');
  if (response.status === 401) return 'API Key 无效，请检查设置';
  if (response.status === 429) return '请求太频繁，请稍后再试';
  if (response.status === 404) return 'API 地址或模型名称不正确';
  if (errBody) {
    try {
      const json = JSON.parse(errBody);
      return json.error?.message || `API 错误 (${response.status})`;
    } catch {}
  }
  return `API 错误 (${response.status})`;
}

function updateThinkingBlock(aiEl, reasoning) {
  const thinkingEl = aiEl.querySelector('.message-thinking');
  const existing = thinkingEl.querySelector('.thinking-content');
  if (existing) {
    existing.textContent = reasoning;
  } else {
    thinkingEl.innerHTML = buildThinkingHtml(reasoning);
    const toggle = thinkingEl.querySelector('.thinking-toggle');
    const content = thinkingEl.querySelector('.thinking-content');
    if (toggle && content) { toggle.classList.add('open'); content.classList.add('open'); }
  }
  scrollToBottom();
}

function stopGeneration() {
  if (abortController) abortController.abort();
}

/* ================================================================
 *  Phase 2 — 消息操作：复制、编辑、重新生成、删除
 * ================================================================ */
function copyMessage(msg) {
  const text = msg.content;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => copyFallback(text, null));
  } else {
    copyFallback(text, null);
  }
  showToast('已复制到剪贴板');
}

function showToast(msg) {
  errorToastEl.textContent = msg;
  errorToastEl.style.background = 'var(--success)';
  errorToastEl.classList.add('active');
  clearTimeout(errorTimer);
  errorTimer = setTimeout(() => {
    errorToastEl.classList.remove('active');
    errorToastEl.style.background = '';
  }, 2000);
}

function startEditMessage(el, msg, msgIndex) {
  if (isGenerating) return;
  const contentEl = el.querySelector('.message-content');
  const actionsEl = el.querySelector('.message-actions');
  const originalContent = msg.content;

  actionsEl.style.display = 'none';

  const infoSvg = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

  contentEl.innerHTML = `
    <div class="message-edit-wrapper">
      <textarea class="message-edit-area">${escapeHtml(originalContent)}</textarea>
    </div>
    <div class="message-edit-info">
      ${infoSvg}
      <span>编辑此消息将创建一个新的对话分支，可使用箭头在分支间切换。</span>
    </div>
    <div class="message-edit-footer">
      <button class="btn-cancel">取消</button>
      <button class="btn-save">保存</button>
    </div>`;

  const textarea = contentEl.querySelector('.message-edit-area');
  textarea.focus();
  textarea.style.height = textarea.scrollHeight + 'px';
  textarea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
  });

  contentEl.querySelector('.btn-cancel').addEventListener('click', () => renderMessages());

  contentEl.querySelector('.btn-save').addEventListener('click', () => {
    const newText = textarea.value.trim();
    if (!newText) return;

    if (msg.role === 'user') {
      ensureVariants(msg);
      msg.variants.push({ content: newText, timestamp: Date.now() });
      msg.activeVariant = msg.variants.length - 1;
      msg.content = newText;
      const conv = getActiveConversation();
      conv.messages = conv.messages.slice(0, msgIndex + 1);
      saveConversations();
      renderMessages();
      resendFromEdit(conv);
    } else {
      msg.content = newText;
      if (msg.variants) {
        msg.variants[msg.activeVariant].content = newText;
      }
      saveConversations();
      renderMessages();
    }
  });
}

async function resendFromEdit(conv) {
  const apiMessages = conv.messages
    .filter(m => !(m.role === 'assistant' && !m.content))
    .map(m => ({ role: m.role, content: m.content }));

  const aiMsg = { role: 'assistant', content: '', reasoning: '', timestamp: Date.now() };
  conv.messages.push(aiMsg);
  const aiEl = createMessageEl(aiMsg, conv.messages.length - 1);
  const aiContentEl = aiEl.querySelector('.message-content');
  aiContentEl.innerHTML = '<div class="claude-spinner">' + SPINNER_SVG + '</div>';
  messagesEl.appendChild(aiEl);
  scrollToBottom();

  isGenerating = true;
  btnSend.innerHTML = '■';
  btnSend.classList.add('btn-stop');
  abortController = new AbortController();

  try {
    if (CONFIG.apiFormat === 'anthropic') {
      await streamAnthropic(apiMessages, aiMsg, aiEl, aiContentEl);
    } else {
      await streamOpenAI(apiMessages, aiMsg, aiEl, aiContentEl);
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      showError(err.message === 'Failed to fetch' ? '网络错误，请检查 API 地址' : err.message);
    }
    if (!aiMsg.content && !aiMsg.reasoning) { conv.messages.pop(); aiEl.remove(); }
  } finally {
    aiContentEl.classList.remove('typing-cursor');
    const sp = aiContentEl.querySelector('.claude-spinner');
    if (sp) sp.remove();
    isGenerating = false;
    abortController = null;
    btnSend.innerHTML = '↑';
    btnSend.classList.remove('btn-stop');
    saveConversations();
    renderChatList();
  }
}

function regenerateMessage(msgIndex) {
  if (isGenerating) return;
  const conv = getActiveConversation();
  if (!conv) return;

  const msg = conv.messages[msgIndex];
  ensureVariants(msg);

  msg.variants.push({ content: '', reasoning: '', timestamp: Date.now() });
  msg.activeVariant = msg.variants.length - 1;
  msg.content = '';
  msg.reasoning = '';

  conv.messages = conv.messages.slice(0, msgIndex + 1);
  saveConversations();
  renderMessages();
  streamRegenerate(conv, msgIndex);
}

async function streamRegenerate(conv, aiMsgIndex) {
  const aiMsg = conv.messages[aiMsgIndex];
  const aiEl = messagesEl.querySelector('[data-msg-index="' + aiMsgIndex + '"]');
  if (!aiEl) return;
  const aiContentEl = aiEl.querySelector('.message-content');
  aiContentEl.innerHTML = '<div class="claude-spinner">' + SPINNER_SVG + '</div>';

  const apiMessages = [];
  for (let i = 0; i < aiMsgIndex; i++) {
    const m = conv.messages[i];
    if (m.content) apiMessages.push({ role: m.role, content: m.content });
  }

  isGenerating = true;
  btnSend.innerHTML = '■';
  btnSend.classList.add('btn-stop');
  abortController = new AbortController();

  try {
    if (CONFIG.apiFormat === 'anthropic') {
      await streamAnthropic(apiMessages, aiMsg, aiEl, aiContentEl);
    } else {
      await streamOpenAI(apiMessages, aiMsg, aiEl, aiContentEl);
    }
  } catch (err) {
    const noContent = !aiMsg.content && !aiMsg.reasoning;
    if (err.name !== 'AbortError') {
      showError(err.message === 'Failed to fetch' ? '网络错误' : err.message);
    }
    if (noContent && aiMsg.variants && aiMsg.variants.length > 1) {
      aiMsg.variants.pop();
      aiMsg.activeVariant = aiMsg.variants.length - 1;
      const v = aiMsg.variants[aiMsg.activeVariant];
      aiMsg.content = v.content;
      aiMsg.reasoning = v.reasoning || '';
    }
  } finally {
    aiContentEl.classList.remove('typing-cursor');
    const sp = aiContentEl.querySelector('.claude-spinner');
    if (sp) sp.remove();
    isGenerating = false;
    abortController = null;
    btnSend.innerHTML = '↑';
    btnSend.classList.remove('btn-stop');
    if (aiMsg.variants) {
      aiMsg.variants[aiMsg.activeVariant].content = aiMsg.content;
      aiMsg.variants[aiMsg.activeVariant].reasoning = aiMsg.reasoning || '';
    }
    saveConversations();
    renderMessages();
  }
}

function deleteMessage(msgIndex) {
  if (isGenerating) return;
  const conv = getActiveConversation();
  if (!conv) return;
  const count = conv.messages.length - msgIndex;
  if (!confirm(`确定删除此消息及之后共 ${count} 条消息吗？`)) return;
  conv.messages = conv.messages.slice(0, msgIndex);
  saveConversations();
  renderMessages();
  renderChatList();
}

/* ================================================================
 *  工具菜单 + 删除模式
 * ================================================================ */
let deleteMode = false;
let deleteHoveredMsg = null;

function toggleToolsMenu() {
  $('#toolsMenu').classList.toggle('active');
}
function closeToolsMenu() {
  $('#toolsMenu').classList.remove('active');
}

function enterDeleteMode() {
  const conv = getActiveConversation();
  if (!conv || conv.messages.length === 0 || isGenerating) {
    showError('当前没有可删除的消息');
    closeToolsMenu();
    return;
  }
  closeToolsMenu();
  deleteMode = true;
  deleteHoveredMsg = null;

  messagesEl.classList.add('delete-mode');
  $('#inputArea').style.display = 'none';

  const banner = document.createElement('div');
  banner.className = 'delete-mode-banner';
  banner.id = 'deleteModeBanner';
  banner.innerHTML = '<span>点击消息选择删除起点，该消息及之后的所有消息将被删除</span>';
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '取消';
  cancelBtn.addEventListener('click', exitDeleteMode);
  banner.appendChild(cancelBtn);
  messagesEl.parentElement.insertBefore(banner, messagesEl);
}

function exitDeleteMode() {
  deleteMode = false;
  deleteHoveredMsg = null;
  messagesEl.classList.remove('delete-mode');
  messagesEl.querySelectorAll('.delete-highlight').forEach(el => el.classList.remove('delete-highlight'));
  const banner = document.getElementById('deleteModeBanner');
  if (banner) banner.remove();
  const bar = document.getElementById('deleteConfirmBar');
  if (bar) bar.remove();
  $('#inputArea').style.display = '';
}

function showDeleteConfirm(msgIndex) {
  const conv = getActiveConversation();
  if (!conv) return;
  const count = conv.messages.length - msgIndex;

  let bar = document.getElementById('deleteConfirmBar');
  if (bar) bar.remove();
  bar = document.createElement('div');
  bar.className = 'delete-confirm-bar';
  bar.id = 'deleteConfirmBar';
  bar.innerHTML = '<span>将删除 ' + count + ' 条消息</span>';

  const btnOk = document.createElement('button');
  btnOk.className = 'btn-confirm-delete';
  btnOk.textContent = '确认删除';
  btnOk.addEventListener('click', () => {
    conv.messages = conv.messages.slice(0, msgIndex);
    saveConversations();
    exitDeleteMode();
    renderMessages();
    renderChatList();
  });

  const btnNo = document.createElement('button');
  btnNo.className = 'btn-cancel-delete';
  btnNo.textContent = '取消';
  btnNo.addEventListener('click', exitDeleteMode);

  bar.appendChild(btnOk);
  bar.appendChild(btnNo);
  messagesEl.parentElement.appendChild(bar);
}

// 删除模式事件委托
messagesEl.addEventListener('mouseover', (e) => {
  if (!deleteMode) return;
  const msgEl = e.target.closest('.message');
  if (!msgEl || msgEl === deleteHoveredMsg) return;
  deleteHoveredMsg = msgEl;
  messagesEl.querySelectorAll('.delete-highlight').forEach(el => el.classList.remove('delete-highlight'));
  let el = msgEl;
  while (el) {
    if (el.classList.contains('message')) el.classList.add('delete-highlight');
    el = el.nextElementSibling;
  }
});

messagesEl.addEventListener('click', (e) => {
  if (!deleteMode) return;
  const msgEl = e.target.closest('.message');
  if (!msgEl) return;
  e.preventDefault();
  e.stopPropagation();
  showDeleteConfirm(parseInt(msgEl.dataset.msgIndex));
}, true);

function toolRegenerate() {
  closeToolsMenu();
  const conv = getActiveConversation();
  if (!conv || conv.messages.length === 0 || isGenerating) return;
  for (let i = conv.messages.length - 1; i >= 0; i--) {
    if (conv.messages[i].role === 'assistant') {
      regenerateMessage(i);
      return;
    }
  }
}

function toolContinue() {
  closeToolsMenu();
  if (!getActiveConversation() || isGenerating) return;
  userInputEl.value = '请继续';
  sendMessage();
}

  CONFIG.model = saved.model || 'gpt-4o';
  CONFIG.apiFormat = saved.apiFormat || 'openai';
  CONFIG.enableThinking = saved.enableThinking || false;
  CONFIG.theme = saved.theme || 'dark';
  CONFIG.sendKey = saved.sendKey || 'ctrl+enter';

  $('#settingApiUrl').value = CONFIG.apiUrl;
  $('#settingApiKey').value = CONFIG.apiKey;
  $('#settingModel').value = CONFIG.model;
  $('#settingApiFormat').value = CONFIG.apiFormat;
  $('#settingEnableThinking').checked = CONFIG.enableThinking;
  updateFormatHint();

}

function saveSettings() {
  CONFIG.apiUrl = $('#settingApiUrl').value.trim();
  CONFIG.apiKey = $('#settingApiKey').value.trim();

  }
});

$('#btnThemeDark').addEventListener('click', () => { applyTheme('dark'); saveSettings(); });
$('#btnThemeLight').addEventListener('click', () => { applyTheme('light'); saveSettings(); });
$('#btnSendKeyCtrl').addEventListener('click', () => { applySendKey('ctrl+enter'); saveSettings(); });
$('#btnSendKeyEnter').addEventListener('click', () => { applySendKey('enter'); saveSettings(); });

// 设置面板输入框实时保存
['settingApiUrl', 'settingApiKey', 'settingModel'].forEach(id => {
  document.getElementById(id).addEventListener('input', saveSettings);
});
$('#settingApiFormat').addEventListener('change', () => { updateFormatHint(); saveSettings(); });
$('#settingEnableThinking').addEventListener('change', saveSettings);

/* ================================================================
 *  初始化
 * ================================================================ */
loadSettings();
renderChatList();

if (activeConvId && getActiveConversation()) {
  renderMessages();
} else {
  activeConvId = null;
}
</script>
</body>
</html>
